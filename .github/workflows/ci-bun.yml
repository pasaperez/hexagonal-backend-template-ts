name: ci-bun

on:
  push:
    branches: ['**']
  pull_request:

jobs:
  test-bun:
    name: test-bun
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.0
      - run: bun install --frozen-lockfile
      - run: bun run lint
      - run: bun run test
      - run: bun run build
